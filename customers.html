<!DOCTYPE html>
<html>
<head>
    <title>Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">

<h2>Customers</h2>

<form method="POST" action="/add_customer" class="mb-3">
    <input name="name" placeholder="Name" required>
    <input name="phone" placeholder="Phone" required>
    <button class="btn btn-success">Add</button>
</form>

<table class="table table-dark">
<tr>
    <th>Name</th>
    <th>Phone</th>
    <th>Balance</th>
    <th>Actions</th>
</tr>

{% for c in customers %}
<tr>
    <td>{{c.name}}</td>
    <td>{{c.phone}}</td>
    <td>{{c.balance}}</td>
    <td>

        <form action="/add_credit" method="POST" style="display:inline;">
            <input type="hidden" name="customer_id" value="{{c.id}}">
            <input name="amount" placeholder="Credit" required>
            <input name="note" placeholder="Note">
            <button class="btn btn-success btn-sm">+</button>
        </form>

        <form action="/add_payment" method="POST" style="display:inline;">
            <input type="hidden" name="customer_id" value="{{c.id}}">
            <input name="amount" placeholder="Payment" required>
            <button class="btn btn-info btn-sm">-</button>
        </form>

        <td>
    
    <a href="/history/{{c.id}}" class="btn btn-warning btn-sm">View</a>
</td>

    </td>
</tr>
{% endfor %}

</table>

<a href="/" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
