<!DOCTYPE html>
<html>
<head>
    <title>Transaction History</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">📊 Transaction History</h2>

    <a href="/customers" class="btn btn-secondary mb-3">⬅ Back</a>

    <!-- 🔍 FILTER -->
    <form method="GET" class="row mb-4">
        <div class="col-md-4">
            <input type="date" name="from_date" class="form-control">
        </div>
        <div class="col-md-4">
            <input type="date" name="to_date" class="form-control">
        </div>
        <div class="col-md-4">
            <button class="btn btn-warning w-100">Filter</button>
        </div>
    </form>

    <!-- 📊 CHART -->
    <canvas id="myChart" height="100"></canvas>

    <hr>

    <!-- 📋 TABLE -->
    <table class="table table-dark table-hover table-bordered mt-4">
        <tr>
            <th>Type</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Note</th>
        </tr>

        {% for t in transactions %}
        <tr>
            <td>
                {% if t.type == 'credit' %}
                    <span class="badge bg-success">Credit</span>
                {% else %}
                    <span class="badge bg-info">Payment</span>
                {% endif %}
            </td>
            <td>₹ {{ t.amount }}</td>
            <td>{{ t.date }}</td>
            <td>{{ t.note }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

<!-- 👨‍💻 FOOTER -->
<footer class="text-center mt-5 mb-3 text-muted">
    Developed by <b>Sunil Mali</b>, <b>Bhanu Sharma</b>, <b>Abhay Singh Shekawat</b>
</footer>

<!-- 📊 CHART SCRIPT -->
<script>
    const labels = [{% for t in transactions %}'{{t.date}}',{% endfor %}];
    const data = [{% for t in transactions %}{{t.amount}},{% endfor %}];

    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Transaction Amount',
                data: data,
                borderWidth: 2
            }]
        }
    });
</script>

</body>
</html>
