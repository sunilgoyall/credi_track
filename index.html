<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">

    <h2>Dashboard</h2>

    <a href="/customers" class="btn btn-warning mb-4">Manage Customers</a>

    <div class="row text-center">

        <div class="col-md-4">
            <div class="card bg-success p-3">
                <h4>Total Credit</h4>
                <h2>{{credit}}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-info p-3">
                <h4>Total Payment</h4>
                <h2>{{payment}}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-danger p-3">
                <h4>Balance</h4>
                <h2>{{balance}}</h2>
            </div>
        </div>

    </div>

</div>
<p style="text-align:center; margin-top:20px;">
    Developed by Sunil Mali, Bhanu Sharma and Abhay Singh Shekawat
</p>
</body>
</html>
